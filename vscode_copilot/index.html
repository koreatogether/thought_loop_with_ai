<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThoughtBloom | 무한 생각의 확장</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="bg-canvas"></div>
    
    <div class="app-container">
        <header>
            <h1>ThoughtBloom</h1>
            <p class="instruction">생각에서 살을 붙여 덩어리를 키우세요. 노드를 클릭해 확장하고, 새로운 줄기로 뻗어 나갑니다.</p>
        </header>

        <div id="canvas-container">
            <svg id="svg-layer" style="position: absolute; width: 5000px; height: 5000px; top: 0; left: 0; pointer-events: none;"></svg>
            <div id="thought-canvas" style="width: 5000px; height: 5000px;">
                <!-- Nodes will be injected here -->
            </div>
        </div>
    </div>

    <!-- UI Overlay for controls -->
    <div style="position: fixed; bottom: 2rem; right: 2rem; display: flex; gap: 1rem; z-index: 1000;">
        <button id="add-root" class="icon-btn" style="padding: 1rem 1.5rem; font-weight: 700;">+ 새로운 생각의 씨앗</button>
        <button id="reset-view" class="icon-btn" style="padding: 1rem;">초기화</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
